                      { style: { width: "200px", flexShrink: 0 } },
                      processConfig.map((p) =>
                        React.createElement(
                          "div",
                          { key: p.id, className: "process-row" },
                          React.createElement(
                            "div",
                            { className: "process-badge" },
                            p.label.slice(0, 1) +
                              (p.label.charCodeAt(1) >= 0xff00
                                ? p.label.slice(1, 2)
                                : ""),
                          ),
                          React.createElement(
                            "label",
                            { className: "process-label" },
                            p.label.replace(/^[①-⑭]/, ""),
                          ),
                          React.createElement("input", {
                            type: "number",
                            readOnly: true,
                            value: processStopTimes[p.id],
                            className: "process-input",
                            placeholder: "0",
                          }),
                          React.createElement(
                            "span",
                            { className: "process-unit" },
                            "分",
                          ),
                        ),
                      ),
                    ),
                    React.createElement(
                      "div",
                      { style: { flex: 1, minWidth: 0 } },
                      (() => {
                        const tot = Object.values(processStopTimes).reduce(
                          (s, t) => s + (parseFloat(t) || 0),
                          0,
                        );
                        return tot > 0
                          ? React.createElement("canvas", {
                              id: "processStopTimesChart",
                            })
                          : React.createElement(
                              "div",
                              {
                                className:
                                  "flex items-center justify-center h-full text-center color-slate5",
                                style: { minHeight: "300px" },
                              },
                              React.createElement(
                                "div",
                                null,
                                React.createElement(
                                  "div",
                                  null,
                                  "工程別停止時間を入力すると",
                                ),
                                React.createElement(
                                  "div",
                                  null,
                                  "円グラフが表示されます",
                                ),
                              ),
                            );
                      })(),
                    ),
                  ),
                ),
              ),

              React.createElement(
                "div",
                { className: "card card-p anim-fade" },
                React.createElement(
                  "div",
                  {
                    className: "section-title",
                    style: { fontSize: "1.8rem", marginBottom: "12px" },
                  },
                  React.createElement("span", null, "📈"),
                  React.createElement(
                    "span",
                    { className: "accent" },
                    "可動率推移グラフ",
                  ),
                ),
                React.createElement("div", { className: "divider" }),
                (() => {
                  const hasData = history.some(
                    (r) => r.availableTime !== undefined,
                  );
                  if (!hasData)
                    return React.createElement(
                      "div",
                      { className: "text-center color-slate5 p-6" },
                      "可動率データがありません",
                    );
                  const mr =
                    monthlySummary.availableTime > 0
                      ? (
                          (monthlySummary.actualOperatingTime /
                            monthlySummary.availableTime) *
                          100
                        ).toFixed(2)
                      : "0.00";
                  const [y, mo] = selectedOperatingMonth.split("-");
                  return React.createElement(
                    "div",
                    { className: "flex gap-5" },
                    React.createElement(
                      "div",
                      {
                        style: {
                          flex: 1,
                          minWidth: 0,
                          position: "relative",
                          height: "420px",
                        },
                      },
                      React.createElement("canvas", {
                        id: "operatingRateChart",
                      }),
                    ),
                    React.createElement(
                      "div",
                      {
                        style: {
                          width: "180px",
                          flexShrink: 0,
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "center",
                        },
                      },
                      React.createElement(
                        "div",
                        {
                          className: "monthly-badge monthly-badge-cyan w-full",
                        },
                        React.createElement(
                          "div",
                          { className: "monthly-badge-label" },
                          "月度累積可動率",
                        ),
                        React.createElement(
                          "div",
                          { style: { marginTop: "8px" } },
                          React.createElement(
                            "span",
                            { className: "monthly-badge-value" },
                            mr,
                          ),
                          React.createElement(
                            "span",
                            { className: "monthly-badge-unit" },
                            "%",
                          ),
                        ),
                        React.createElement(
                          "div",
                          {
                            className: "monthly-badge-sub",
                            style: { marginTop: "8px" },
                          },
                          `${y}年${mo}月度`,
                        ),
                      ),
                    ),
                  );
                })(),
              ),
            ),

          // ── 工程選択モーダル ──
          showProcessModal &&
            React.createElement(
              "div",
              {
                className: "modal-overlay",
                onClick: () => setShowProcessModal(false),
              },
              React.createElement(
                "div",
                {
                  className: "modal-content",
                  onClick: (e) => e.stopPropagation(),
                },
                React.createElement(
                  "div",
                  { className: "modal-header" },
                  React.createElement(
                    "div",
                    { className: "modal-title" },
                    "🔧 工程選択",
                  ),
                  React.createElement(
                    "button",
                    {
                      className: "modal-close",
                      onClick: () => setShowProcessModal(false),
                    },
                    "×",
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "space-y-2 mb-4" },
                  processConfig.map((p) =>
                    React.createElement(
                      "div",
                      { key: p.id, className: "modal-process-row" },
                      React.createElement("input", {
                        type: "checkbox",
                        checked: selectedProcesses.includes(p.id),
                        onChange: (e) => {
                          if (e.target.checked)
                            setSelectedProcesses([...selectedProcesses, p.id]);
                          else
                            setSelectedProcesses(
                              selectedProcesses.filter((id) => id !== p.id),
                            );
                        },
                      }),
                      React.createElement(
                        "span",
                        {
                          style: {
                            flex: "0 0 160px",
                            fontSize: "1.3rem",
                            color: "var(--slate-300)",
                          },
                        },
                        p.label,
                      ),
                      React.createElement(
                        "div",
                        {
                          className: "flex items-center gap-2",
                          style: { flex: 1 },
                        },
                        React.createElement("input", {
                          type: "number",
                          value: modalProcessTimes[p.id],
                          onChange: (e) =>
                            setModalProcessTimes({
                              ...modalProcessTimes,
                              [p.id]: e.target.value,
                            }),
                          onClick: (e) => e.stopPropagation(),
                          placeholder: "0",
                          min: "0",
                          max: "1440",
                          step: "1",
                          className: "modal-process-input",
                        }),
                        React.createElement(
                          "span",
                          {
                            className: "text-xs color-slate5",
                            style: { flexShrink: 0 },
                          },
                          "分",
                        ),
                      ),
                    ),
                  ),
                ),
                React.createElement(
                  "div",
                  { className: "modal-footer" },
                  React.createElement(
                    "button",
                    {
                      onClick: () => {
                        setSelectedProcesses([]);
                        setModalProcessTimes({
                          opener: "",
                          cardMachine: "",
                          former: "",
                          aj: "",
                          processor: "",
                          bds: "",
                          ssd: "",
                          heatCylinder: "",
                          winder: "",
                          slitter: "",
                          stockDelay: "",
                          setupDelay: "",
                          cleaningDelay: "",
                          auxiliaryEquipment: "",
                        });
                      },
                      className: "btn btn-ghost flex-1",
                    },
                    "クリア",
                  ),
                  React.createElement(
                    "button",
                    {
                      onClick: () => {
                        const sum = Object.values(modalProcessTimes).reduce(
                          (s, t) => s + (parseFloat(t) || 0),
                          0,
                        );
                        const mainSt = parseFloat(stopTime) || 0;
                        if (sum !== mainSt) {
                          showToast(
                            `停止時間の相違があります。入力停止時間: ${mainSt.toFixed(0)}分 / 工程合計: ${sum.toFixed(0)}分`,
                            "warning",
                          );
                          return;
                        }
                        setShowProcessModal(false);
                      },
                      className: "btn btn-emerald flex-1",
                    },
                    "確定",
                  ),
                ),
              ),
            ),
        );
      }

      // ================================================================
      // ルートコンポーネント（認証フロー制御）
      // ================================================================
      function App() {
        // 初期フェーズ: 未初期化なら setup、初期化済みなら閲覧ダッシュボード、セッションありなら loading
        const [phase, setPhase] = useState(() => {
          if (!UserManager.isInitialized()) return "setup";
          // ページリロード後は暗号化キーが消えるためダッシュボード→ログインへ
          if (!getSessionCryptoKey()) {
            UserManager.logout();
            return "dashboard";
          }
          // rawSession があれば HMAC 検証を非同期で行うため一時的に loading 状態にする
          return UserManager.hasRawSession() ? "loading" : "dashboard";
        });
        const [session, setSession] = useState(null);

        // M-3: 起動時の HMAC 検証（loading フェーズ時のみ実行）
        useEffect(() => {
          if (phase !== "loading") return;
          UserManager.getSession().then((s) => {
            if (s) {
              setSession(s);
              setPhase("app");
            } else {
              setPhase("login");
            }
          });
        }, [phase]);

        const handleSetupDone = () => setPhase("login");
        const handleDashboardLoginClick = async () => {
          try {
            // 公開用: ログイン画面をスキップしてモード選択画面へ
            await initSessionKey(PUBLIC_PASSPHRASE, PUBLIC_USER_ID);
            await seedDummyData10DaysEnsure();
            setSession(buildPublicSession());
            setPhase("app");
          } catch (e) {
            console.error(e);
            showToast("起動に失敗しました。再読み込みしてください。", "error");
          }
        };
        const handleLogin = (s) => {
          setSession(s);
          setPhase("welcome");
        };
        const handleWelcomeDone = () => setPhase("app");
        const handleLogout = () => {
          UserManager.logout();
          setSession(null);
          setPhase("dashboard");
        };

        if (phase === "loading") return null;

        return React.createElement(
          React.Fragment,
          null,
          React.createElement(ToastProvider, null),
          React.createElement(ConfirmDialog, null),
          phase === "setup" &&
            React.createElement(SetupScreen, { onDone: handleSetupDone }),
          phase === "dashboard" &&
            React.createElement(DashboardScreen, {
              onLoginClick: handleDashboardLoginClick,
            }),
          phase === "login" &&
            React.createElement(LoginScreen, { onLogin: handleLogin }),
          phase === "welcome" &&
            React.createElement(WelcomeScreen, {
              session,
              onDone: handleWelcomeDone,
            }),
          phase === "app" &&
            React.createElement(ProductionApp, {
              session,
              onLogout: handleLogout,
            }),
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    </script>
  </body>
</html>
