<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      M-2対応: Content Security Policy
      【単一 HTML ファイル運用上の制約と設定根拠】
      - script-src: アプリ本体がインライン <script> のため 'unsafe-inline' が必須。
                    外部ライブラリは cdn.jsdelivr.net の SRI 付きタグのみ許可。
      - style-src : インラインスタイル（style 属性 / <style> タグ）を多用するため
                    'unsafe-inline' を許可。Google Fonts CSS を読み込むため
                    fonts.googleapis.com も許可。
      - font-src  : Google Fonts のフォントファイル配信元のみ許可。
      - connect-src: SRI 検証のため CDN への接続を許可。'self' は file:// 環境向け。
                     外部 API は一切使用しないため追加ホストは最小限にとどめる。
      - object-src: Flash 等のプラグインを禁止。
      - base-uri  : <base> タグによるパス乗っ取りを防止。
      - form-action: フォームの外部送信を禁止。
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://cdn.jsdelivr.net; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>生産管理アプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"
      integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"
      integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
      integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"
      integrity="sha384-oNtu+d18330MVFpltUTve1DatxCkkctlpA2AC3GulbVFOSqhHdDat3qHse/Lbuek"
      crossorigin="anonymous"
    ></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --navy-950: #050d1a;
        --navy-900: #0a1628;
        --navy-800: #0f2040;
        --navy-750: #122448;
        --navy-700: #152b58;
        --navy-600: #1a3570;
        --navy-500: #1e3f88;
        --navy-400: #2952a3;
        --cyan-500: #06b6d4;
        --cyan-400: #22d3ee;
        --cyan-300: #67e8f9;
        --cyan-200: #a5f3fc;
        --cyan-100: #cffafe;
        --cyan-glow: rgba(6, 182, 212, 0.35);
        --cyan-glow-soft: rgba(6, 182, 212, 0.15);
        --cyan-glow-xs: rgba(6, 182, 212, 0.08);
        --white: #ffffff;
        --slate-50: #f8fafc;
        --slate-100: #f0f4f8;
        --slate-200: #e2e8f0;
        --slate-300: #cbd5e1;
        --slate-400: #94a3b8;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-700: #334155;
        --slate-800: #1e293b;
        --card-bg: rgba(15, 32, 64, 0.92);
        --card-border: rgba(6, 182, 212, 0.18);
        --card-border-hover: rgba(6, 182, 212, 0.4);
        --input-bg: rgba(10, 22, 40, 0.7);
        --font: "Noto Sans JP", "Segoe UI", "Meiryo", sans-serif;
        --yield-primary: #7c3aed;
        --yield-light: rgba(124, 58, 237, 0.12);
        --yield-border: rgba(124, 58, 237, 0.3);
        --operating-primary: var(--cyan-500);
        --operating-light: var(--cyan-glow-xs);
        --operating-border: var(--card-border);
        --success: #34d399;
        --success-light: rgba(52, 211, 153, 0.1);
        --success-border: rgba(52, 211, 153, 0.3);
        --danger: #f87171;
        --danger-light: rgba(248, 113, 113, 0.1);
        --danger-border: rgba(248, 113, 113, 0.3);
        --warning: #fbbf24;
        --warning-light: rgba(251, 191, 36, 0.1);
        --warning-border: rgba(251, 191, 36, 0.3);
        --info: #60a5fa;
        --info-light: rgba(96, 165, 250, 0.1);
        --info-border: rgba(96, 165, 250, 0.3);
        --amber-val: #f59e0b;
        --purple-val: #a855f7;
      }

      html {
        font-size: 50%;
      }
      body {
        font-family: var(--font);
        background: var(--navy-950);
        color: var(--white);
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse 80% 50% at 10% 20%,
            rgba(21, 43, 88, 0.8) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse 60% 40% at 90% 80%,
            rgba(6, 182, 212, 0.06) 0%,
            transparent 55%
          );
        pointer-events: none;
        z-index: 0;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(6, 182, 212, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(6, 182, 212, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }
      #root {
        position: relative;
        z-index: 1;
      }

      /* ── アニメーション ── */
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes pulseGlow {
        0%,
        100% {
          box-shadow: 0 0 16px var(--cyan-glow);
        }
        50% {
          box-shadow:
            0 0 32px var(--cyan-glow),
            0 0 60px var(--cyan-glow-soft);
        }
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .anim-fade {
        animation: fadeInUp 0.4s ease both;
      }

      /* ── ウェルカム画面 ── */
      @keyframes welcomeBgShift {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }
      @keyframes slideUpFade {
        from {
          opacity: 0;
          transform: translateY(36px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes subSlideUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes progressBar {
        from {
          width: 0%;
        }
        to {
          width: 100%;
        }
      }
      @keyframes particlePulse {
        0%,
        100% {
          opacity: 0.1;
          transform: scale(1);
        }
        50% {
          opacity: 0.45;
          transform: scale(1.15);
        }
      }
      @keyframes cornerLineH {
        0%,
        100% {
          opacity: 0.12;
        }
        50% {
          opacity: 0.55;
        }
      }
      @keyframes cornerLineV {
        0%,
        100% {
          opacity: 0.12;
        }
        50% {
          opacity: 0.55;
        }
      }

      .welcome-screen {
        position: fixed;
        inset: 0;
        z-index: 9998;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          135deg,
          #050d1a 0%,
          #0a1628 20%,
          #062030 40%,
          #0c2a38 60%,
          #071e30 80%,
          #050d1a 100%
        );
        background-size: 400% 400%;
        animation: welcomeBgShift 8s ease infinite;
        overflow: hidden;
      }

      /* 四隅装飾（CSSのみ） */
      .welcome-screen::before,
      .welcome-screen::after {
        content: "";
        position: absolute;
        width: 120px;
        height: 120px;
        pointer-events: none;
      }
      .welcome-screen::before {
        top: 32px;
        left: 32px;
        border-top: 1px solid rgba(6, 182, 212, 0.5);
        border-left: 1px solid rgba(6, 182, 212, 0.5);
        animation: cornerLineH 2.8s ease-in-out infinite;
      }
      .welcome-screen::after {
        bottom: 32px;
        right: 32px;
        border-bottom: 1px solid rgba(6, 182, 212, 0.5);
        border-right: 1px solid rgba(6, 182, 212, 0.5);
        animation: cornerLineH 2.8s ease-in-out infinite 1.4s;
      }

      /* 追加コーナー装飾（疑似要素で賄えない分はdivで） */
      .welcome-corner-tr {
        position: absolute;
        top: 32px;
        right: 32px;
        width: 120px;
        height: 120px;
        pointer-events: none;
        border-top: 1px solid rgba(6, 182, 212, 0.5);
        border-right: 1px solid rgba(6, 182, 212, 0.5);
        animation: cornerLineV 2.8s ease-in-out infinite 0.7s;
      }
      .welcome-corner-bl {
        position: absolute;
        bottom: 32px;
        left: 32px;
        width: 120px;
        height: 120px;
        pointer-events: none;
        border-bottom: 1px solid rgba(6, 182, 212, 0.5);
        border-left: 1px solid rgba(6, 182, 212, 0.5);
        animation: cornerLineV 2.8s ease-in-out infinite 2.1s;
      }

      /* パーティクル（光の粒） */
      .welcome-particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .wp {
        position: absolute;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(6, 182, 212, 0.9) 0%,
          transparent 70%
        );
        animation: particlePulse ease-in-out infinite;
      }

      /* 中央コンテンツ */
      .welcome-content {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 0 24px;
      }
      .welcome-greeting {
        font-size: 1.6rem;
        font-weight: 400;
        color: var(--cyan-300);
        letter-spacing: 0.25em;
        opacity: 0;
        animation: subSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
      }
      .welcome-title {
        font-size: clamp(3.6rem, 6vw, 7rem);
        font-weight: 800;
        background: linear-gradient(
          135deg,
          #ffffff 0%,
          var(--cyan-300) 50%,
          var(--cyan-500) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.15;
        margin: 16px 0 12px;
        opacity: 0;
        animation: slideUpFade 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.05s
          forwards;
      }
      .welcome-user-info {
        font-size: 1.4rem;
        color: var(--slate-300);
        letter-spacing: 0.08em;
        line-height: 2;
        opacity: 0;
        animation: subSlideUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.55s forwards;
      }
      .welcome-role-badge {
        display: inline-block;
        background: rgba(6, 182, 212, 0.12);
        border: 1px solid rgba(6, 182, 212, 0.35);
        color: var(--cyan-400);
        padding: 3px 14px;
        border-radius: 100px;
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        margin-top: 6px;
      }
      .welcome-system-name {
        font-size: 1.1rem;
        color: var(--slate-500);
        letter-spacing: 0.2em;
        margin-top: 32px;
        opacity: 0;
        animation: subSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.85s forwards;
      }

      /* プログレスバー */
      .welcome-progress-wrap {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: rgba(6, 182, 212, 0.08);
      }
      .welcome-progress-bar {
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--cyan-500) 30%,
          var(--cyan-300) 60%,
          var(--cyan-400) 100%
        );
        box-shadow:
          0 0 12px var(--cyan-glow),
          0 0 24px var(--cyan-glow-soft);
        width: 0%;
        animation: progressBar 3s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
      }

      /* Toast ── */
      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateX(-50%) translateY(-12px) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translateX(-50%) translateY(0) scale(1);
        }
      }
      @keyframes toastOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translateX(-50%) translateY(-8px);
        }
      }
      .toast {
        position: fixed;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 22px;
        border-radius: 10px;
        font-size: 1.3rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 9999;
        animation: toastIn 0.3s ease-out;
        min-width: 260px;
        max-width: 480px;
        pointer-events: none;
      }
      .toast.hide {
        animation: toastOut 0.3s ease-out forwards;
      }
      .toast-success {
        background: rgba(52, 211, 153, 0.15);
        border: 1px solid rgba(52, 211, 153, 0.45);
        color: #34d399;
      }
      .toast-error {
        background: rgba(248, 113, 113, 0.15);
        border: 1px solid rgba(248, 113, 113, 0.45);
        color: #f87171;
      }
      .toast-warning {
        background: rgba(251, 191, 36, 0.15);
        border: 1px solid rgba(251, 191, 36, 0.45);
        color: #fbbf24;
      }
      .toast-info {
        background: rgba(96, 165, 250, 0.15);
        border: 1px solid rgba(96, 165, 250, 0.45);
        color: #60a5fa;
      }

      /* ── 確認モーダル ── */
      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(5, 13, 26, 0.8);
        backdrop-filter: blur(4px);
        z-index: 9000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .confirm-box {
        background: linear-gradient(
          145deg,
          rgba(15, 32, 64, 0.98) 0%,
          rgba(10, 22, 40, 0.99) 100%
        );
        border: 1px solid var(--card-border);
        border-radius: 16px;
        padding: 28px 32px;
        min-width: 320px;
        max-width: 440px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        animation: fadeInUp 0.25s ease both;
      }
      .confirm-title {
        font-size: 1.6rem;
        font-weight: 700;
        color: var(--white);
        margin-bottom: 10px;
      }
      .confirm-msg {
        font-size: 1.3rem;
        color: var(--slate-300);
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .confirm-actions {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }

      /* ── カード ── */
      .card {
        background: linear-gradient(
          145deg,
          rgba(15, 32, 64, 0.94) 0%,
          rgba(10, 22, 40, 0.97) 100%
        );
        border: 1px solid var(--card-border);
        border-radius: 16px;
        backdrop-filter: blur(20px);
        box-shadow:
          0 4px 6px rgba(0, 0, 0, 0.3),
          0 20px 48px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        border-color: var(--card-border-hover);
      }
      .card-p {
        padding: 24px;
      }
      .card-p-lg {
        padding: 32px;
      }

      /* ── セクション見出し ── */
      .section-title {
        font-size: 2rem;
        font-weight: 700;
        color: var(--white);
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .section-title .accent {
        color: var(--cyan-400);
      }

      /* ── 分割線 ── */
      .divider {
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(6, 182, 212, 0.2),
          transparent
        );
        margin: 16px 0;
      }

      /* ── ラベル ── */
      .form-label {
        display: block;
        font-size: 1.2rem;
        font-weight: 500;
        color: var(--cyan-300);
        letter-spacing: 0.06em;
        margin-bottom: 6px;
      }

      /* ── インプット ── */
      .form-input {
        width: 100%;
        background: var(--input-bg);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        padding: 10px 12px;
        font-family: var(--font);
        font-size: 1.3rem;
        color: var(--white);
        outline: none;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        appearance: none;
        -webkit-appearance: none;
      }
      .form-input::placeholder {
        color: var(--slate-500);
      }
      .form-input:focus {
        border-color: rgba(6, 182, 212, 0.6);
        box-shadow: 0 0 0 3px var(--cyan-glow-soft);
      }
      .form-input[readonly] {
        background: rgba(10, 22, 40, 0.4);
        color: var(--slate-400);
        cursor: not-allowed;
      }
      .form-input option {
        background: var(--navy-800);
        color: var(--white);
      }

      /* スピナー非表示 */
      .form-input[type="number"]::-webkit-outer-spin-button,
      .form-input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
      }
      .form-input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      /* ── ボタン基本 ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-family: var(--font);
        font-size: 1.3rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.15s,
          box-shadow 0.2s;
        letter-spacing: 0.04em;
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn-cyan {
        background: linear-gradient(135deg, var(--cyan-500) 0%, #0891b2 100%);
        color: var(--navy-950);
        box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
      }
      .btn-cyan:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(6, 182, 212, 0.45);
      }
      .btn-yield {
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
        color: #fff;
        box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
      }
      .btn-yield:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-operating {
        background: linear-gradient(135deg, var(--cyan-500) 0%, #0e7490 100%);
        color: var(--navy-950);
        box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
      }
      .btn-operating:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-ghost {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--slate-300);
      }
      .btn-ghost:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .btn-danger {
        background: var(--danger-light);
        border: 1px solid var(--danger-border);
        color: var(--danger);
      }
      .btn-danger:hover {
        background: rgba(248, 113, 113, 0.18);
      }
      .btn-success {
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
        color: #fff;
        box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
      }
      .btn-success:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-sm {
        padding: 6px 14px;
        font-size: 1.1rem;
      }
      .btn-xs {
        padding: 4px 10px;
        font-size: 1rem;
      }
      .btn-full {
        width: 100%;
      }
      .btn-emerald {
        background: linear-gradient(135deg, #059669 0%, #0d9488 100%);
        color: #fff;
        box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
      }
      .btn-emerald:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-lime {
        background: linear-gradient(135deg, #65a30d 0%, #059669 100%);

        -webkit-appearance: none;

        -webkit-appearance: none;

  <body>
    <div id="root"></div>

    <script>
      "use strict";
      const { useState, useEffect, useRef, useCallback } = React;

      // ================================================================
      // 定数
      // ================================================================
      const AUTH_KEY = "pm_auth_users";
      const MASTER_FLAG = "pm_master_initialized";
      const LOGIN_ATTEMPTS = "pm_login_attempts";
      const SESSION_KEY = "pm_session";
      const SESSION_EXPIRY = "pm_session_expiry";
      const DASHBOARD_SUMMARY_KEY = "pm_dashboard_summary";
      // Chart.js 凡例のデフォルト文字色（ダーク背景用）
      if (typeof Chart !== "undefined") {
        Chart.defaults.plugins.legend.labels.color = "#ffffff";
      }
      // SESSION_MS は廃止し、ロール別定数に移行（L-3対応）
      const SESSION_MS_ADMIN = 4 * 60 * 60 * 1000; // 管理者: 4時間
      const SESSION_MS_DEFAULT = 8 * 60 * 60 * 1000; // editor / viewer: 8時間
      const MAX_FAIL = 5;
      const LOCK_MS = 15 * 60 * 1000; // 15分（L-2対応: 3分→15分に延長）
      const STORAGE_WARN_BYTES = 4 * 1024 * 1024; // 4MB警告閾値

      // ================================================================
      // 公開用: 認証スキップ用ゲストセッション + ダミーデータ投入
      // ================================================================
      const PUBLIC_USER_ID = "public";
      const PUBLIC_ROLE = "admin"; // 公開用は入力可能にする
      const PUBLIC_PASSPHRASE = "pm_public_release_passphrase_v1";
      const buildPublicSession = () => ({
        userId: PUBLIC_USER_ID,
        role: PUBLIC_ROLE,
        loginTime: new Date().toISOString(),
        isPublic: true,
      });
      const seedDummyData10DaysEnsure = async () => {
        try {
          // 簡易PRNG（毎回同じ“ランダム”になるよう固定シード）
          const mulberry32 = (a) => () => {
            let t = (a += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
          const rnd = mulberry32(20260318);
          const rInt = (min, max) =>
            Math.floor(rnd() * (max - min + 1)) + min;
          const rFloat = (min, max, dp = 2) =>
            parseFloat((min + rnd() * (max - min)).toFixed(dp));

          const now = new Date();
          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, "0");
          const ym = `${y}-${m}`;
          const key = `history_${ym}`;
          const pad2 = (n) => String(n).padStart(2, "0");
          const mkDate = (d) => `${y}-${m}-${pad2(d)}`;

          const processKeys = [
            "opener",
            "cardMachine",
            "former",
            "aj",
            "processor",
            "bds",
            "ssd",
            "heatCylinder",
            "winder",
            "slitter",
            "stockDelay",
            "setupDelay",
            "cleaningDelay",
            "auxiliaryEquipment",
          ];

          const lossPalette = [
            { category: "端材", color: "#f97316" },
            { category: "粉塵", color: "#a855f7" },
            { category: "調整ロス", color: "#60a5fa" },
            { category: "機械調整", color: "#22c55e" },
          ];

          const stored = await secureGet(key, []);
          const base = Array.isArray(stored) ? stored : [];
          const isYieldRec = (r) => r && r.rawMaterial !== undefined && r.rawMaterial !== null;
          const isOpRec = (r) =>
            r && r.availableTime !== undefined && r.availableTime !== null;
          const matchDateShift = (r, d, s) =>
            r && r.date === d && String(r.shift || "1") === String(s || "1");
          const yieldCount = base.filter(isYieldRec).length;
          const opCount = base.filter(isOpRec).length;
          if (yieldCount >= 10 && opCount >= 10) return false;

          const recsToAdd = [];
          for (let day = 1; day <= 10; day++) {
            const shift = day % 2 === 0 ? "2" : "1";
            const productName = day % 3 === 0 ? "デモ品B" : "デモ品A";
            const dStr = mkDate(day);

            // --- 歩留（yield） ---
            if (yieldCount < 10 && !base.some((r) => isYieldRec(r) && matchDateShift(r, dStr, shift))) {
              const raw = rInt(850, 1300);
              const stdRate = rFloat(92.0, 97.0, 2);
              const actRate = Math.max(85, stdRate - rFloat(0.3, 2.4, 2));
              const stdY = Math.max(0, Math.round((raw * stdRate) / 100));
              const actY = Math.max(0, Math.round((raw * actRate) / 100));
              const recycle = rInt(0, 20);
              const unknown = rInt(-10, 15);
              const lossCount = rInt(1, 3);
              const losses = [];
              for (let i = 0; i < lossCount; i++) {
                const p = lossPalette[(day + i) % lossPalette.length];
                losses.push({
                  category: p.category,
                  amount: String(rInt(5, 35)),
                  color: p.color,
                });
              }
              recsToAdd.push({
                date: dStr,
                shift,
                productName,
                rawMaterial: String(raw),
                standardProductYield: String(stdY),
                actualProductYield: String(actY),
                lossRecycleInput: String(recycle),
                standardYieldRate: stdRate,
                actualYieldRate: actRate,
                unknownLoss: unknown,
                losses,
              });
            }

            // --- 可動率（operating） ---
            if (opCount < 10 && !base.some((r) => isOpRec(r) && matchDateShift(r, dStr, shift))) {
              const available = 480;
              const actualOp = rInt(340, 465);
              const downtime = Math.max(0, available - actualOp);
              const nonManu = Math.min(downtime, rInt(0, 35));
              const stopTime = Math.max(0, downtime - nonManu);

              // stopTime を各工程にランダム配分（合計が stopTime になるようにする）
              const weights = processKeys.map(() => rnd() + 0.05);
              const wSum = weights.reduce((s, v) => s + v, 0);
              const alloc = {};
              let remain = stopTime;
              processKeys.forEach((k, idx) => {
                const isLast = idx === processKeys.length - 1;
                if (isLast) {
                  alloc[k] = String(Math.max(0, remain));
                } else {
                  const v = Math.min(
                    remain,
                    Math.floor((stopTime * weights[idx]) / wSum),
                  );
                  alloc[k] = String(Math.max(0, v));
                  remain -= v;
                }
              });

              recsToAdd.push({
                date: dStr,
                shift,
                productName,
                availableTime: String(available),
                actualOperatingTime: String(actualOp),
                downtime,
                nonManufacturingDowntime: nonManu,
                operatingRate: parseFloat(
                  ((actualOp / available) * 100).toFixed(2),
                ),
                stopTime,
                processStopTimes: alloc,
              });
            }
          }

          if (recsToAdd.length === 0) return false;
          await secureSet(key, [...base, ...recsToAdd]);
          return recsToAdd.length;
        } catch {
          return false;
        }
      };

      // ================================================================
      // ユーティリティ
      // ================================================================

      // ================================================================
      // Web Crypto API ユーティリティ
      // ================================================================

      const enc = new TextEncoder();
      const dec = new TextDecoder();

      // Uint8Array ↔ Base64 変換（大きなバッファに対応）
      const toB64 = (buf) => {
        const bytes = new Uint8Array(buf);
        let bin = "";
        for (let i = 0; i < bytes.length; i++)
          bin += String.fromCharCode(bytes[i]);
        return btoa(bin);
      };
      const fromB64 = (b64) =>
        Uint8Array.from(atob(b64), (c) => c.charCodeAt(0));

      // PBKDF2 でパスワードから AES-GCM 鍵を導出
      // salt: Uint8Array(16)、iterations: 数値
      const deriveKey = async (password, salt, iterations = 100000) => {
        const keyMaterial = await crypto.subtle.importKey(
          "raw",
          enc.encode(String(password || "")),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, hash: "SHA-256", iterations },
          keyMaterial,
          { name: "AES-GCM", length: 256 },
          false,
          ["encrypt", "decrypt"],
        );
      };

      // PBKDF2 パスワードハッシュ（H-2対応）
      // 返り値: "<b64_hash>:<b64_salt>" 形式の文字列
      const hashPassword = async (pw) => {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const key = await deriveKey(pw, salt, 100000);
        // AES-GCM で固定平文を暗号化し、その出力をハッシュ代わりに利用
        const iv = new Uint8Array(12); // 固定 IV（検証用途のみ）
        const ct = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          key,
          enc.encode("pm_verify"),
        );
        return `${toB64(ct)}:${toB64(salt)}`;
      };

      // パスワード検証（H-2対応）
      // storedHash: "<b64_hash>:<b64_salt>" 形式
      const verifyPassword = async (pw, storedHash) => {
        try {
          const [hashB64, saltB64] = storedHash.split(":");
          if (!hashB64 || !saltB64) return false;
          const salt = fromB64(saltB64);
          const key = await deriveKey(pw, salt, 100000);
          const iv = new Uint8Array(12);
          const ct = await crypto.subtle.encrypt(
            { name: "AES-GCM", iv },
            key,
            enc.encode("pm_verify"),
          );
          return toB64(ct) === hashB64;
        } catch {
          return false;
        }
      };

      // localStorage 使用量を概算（UTF-16 換算）
      const estimateStorageUsage = () => {
        try {
          let total = 0;
          for (let i = 0; i < localStorage.length; i++) {
            const k = localStorage.key(i) || "";
            const v = localStorage.getItem(k) || "";
            total += (k.length + v.length) * 2;
          }
          return total;
        } catch {
          return 0;
        }
      };

      // 安全な localStorage 書き込み（容量チェック付き）
      const safeSetItem = (key, value) => {
        const usage = estimateStorageUsage();
        if (usage > STORAGE_WARN_BYTES) {
          throw new Error(
            `ストレージ使用量が上限（4MB）に近づいています（現在: ${(usage / 1024 / 1024).toFixed(1)}MB）。古いデータを削除してから保存してください。`,
          );
        }
        localStorage.setItem(key, value);
      };

      // ================================================================
      // AES-GCM 暗号化 / 復号（Web Crypto API、H-1・H-3対応）
      // ================================================================

      // AES-GCM 暗号化（非同期）
      // 返り値: "<b64_iv>.<b64_ciphertext>" 形式の文字列
      const encrypt = async (data, cryptoKey) => {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const ct = await crypto.subtle.encrypt(
          { name: "AES-GCM", iv },
          cryptoKey,
          enc.encode(JSON.stringify(data)),
        );
        return `${toB64(iv)}.${toB64(ct)}`;
      };

      // AES-GCM 復号（非同期）
      const decrypt = async (cipher, cryptoKey) => {
        const [ivB64, ctB64] = cipher.split(".");
        if (!ivB64 || !ctB64) throw new Error("不正な暗号文フォーマット");
        const iv = fromB64(ivB64);
        const ct = fromB64(ctB64);
        const plain = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv },
          cryptoKey,
          ct,
        );
        return JSON.parse(dec.decode(plain));
      };

      // ================================================================
      // セッション暗号化キー管理（H-1対応）
      // sessionStorage に AES-GCM 鍵の派生情報（ソルト）を保存し、
      // 鍵本体は CryptoKey オブジェクトとしてメモリ上にのみ保持する
      // ================================================================

      // 鍵をメモリに保持（sessionStorage への直列化を避ける）
      let _sessionCryptoKey = null;
      let _sessionHmacKey = null; // M-3: HMAC 署名用鍵（メモリのみ）

      const getSessionCryptoKey = () => _sessionCryptoKey;
      const getSessionHmacKey = () => _sessionHmacKey;

      // ログイン時に呼び出す: PBKDF2(パスワード + userId, 固定ソルト) で鍵を導出する。
      // 固定ソルトにより同一ユーザーは常に同一鍵となり、再ログイン後も保存データを復号できる。
      const initSessionKey = async (password, userId) => {
        const uid = String(userId || "").trim();
        const saltSource = enc.encode("pm_production_manager_salt_v1");
        const salt = new Uint8Array(16);
        for (let i = 0; i < 16; i++)
          salt[i] = saltSource[i % saltSource.length];

        // AES-GCM 用鍵（データ暗号化）
        _sessionCryptoKey = await deriveKey(
          password + userId + ":enc",
          salt,
          100000,
        );

        // HMAC-SHA256 用鍵（M-3: セッション署名）
        // AES 鍵と用途を分離するため ":mac" サフィックスを付けた別パスフレーズで導出
        const macMaterial = await crypto.subtle.importKey(
          "raw",
          enc.encode(password + userId + ":mac"),
          "PBKDF2",
          false,
          ["deriveKey"],
        );
        _sessionHmacKey = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt, hash: "SHA-256", iterations: 100000 },
          macMaterial,
          { name: "HMAC", hash: "SHA-256" },
          false,
          ["sign", "verify"],
        );
      };

      // メモリ上の鍵のみクリア。鍵は固定ソルトで導出するため、再ログインで同一鍵が再現される。
      const clearSessionKey = () => {
        _sessionCryptoKey = null;
        _sessionHmacKey = null;
      };

      // ================================================================
      // セッション HMAC ユーティリティ（M-3対応）
      // ================================================================

      // セッションオブジェクト（hmac フィールド除く）を JSON 文字列化して HMAC を計算
      const computeSessionHmac = async (sessionObj) => {
        const hmacKey = getSessionHmacKey();
        if (!hmacKey) throw new Error("HMACキーが初期化されていません");
        // hmac フィールド自体はペイロードから除外して署名
        const { hmac: _omit, ...payload } = sessionObj;
        const sig = await crypto.subtle.sign(
          "HMAC",
          hmacKey,
          enc.encode(JSON.stringify(payload)),
        );
        return toB64(sig);
      };

      // セッション保存（HMAC 付与）
      const saveSession = async (session) => {
        const hmac = await computeSessionHmac(session);
        const signed = { ...session, hmac };
        sessionStorage.setItem(SESSION_KEY, JSON.stringify(signed));
      };

      // セッション破棄（UserManager より前に定義するためスタンドアロン関数として定義）
      // UserManager.logout() の前方参照を避けるため、ここでは直接クリアする
      const clearSession = () => {
        sessionStorage.removeItem(SESSION_KEY);
        sessionStorage.removeItem(SESSION_EXPIRY);
        clearSessionKey();
      };

      // セッション読み込み（HMAC 検証）
      // 改ざん検知・期限切れ時は clearSession() を呼び null を返す
      const loadSession = async () => {
        try {
          const exp = sessionStorage.getItem(SESSION_EXPIRY);
          if (exp && Date.now() > parseInt(exp, 10)) {
            clearSession();
            return null;
          }
          const d = sessionStorage.getItem(SESSION_KEY);
          if (!d) return null;
          const signed = JSON.parse(d);

          // HMAC 鍵がない場合（ページリロード直後 = 鍵消失）は null を返す
          const hmacKey = getSessionHmacKey();
          if (!hmacKey) return null;

          const { hmac, ...payload } = signed;
          if (!hmac) {
            // 署名フィールドがない = 旧フォーマット or 改ざん
            clearSession();
            return null;
          }
          const expectedSig = enc.encode(JSON.stringify(payload));
          const valid = await crypto.subtle.verify(
            "HMAC",
            hmacKey,
            fromB64(hmac),
            expectedSig,
          );
          if (!valid) {
            clearSession();
            return null;
          }
          return payload;
        } catch {
          return null;
        }
      };

      // ================================================================
      // 暗号化ストレージ（H-3対応: フォールバック完全禁止）
      // ================================================================

      // 暗号化して保存（セッションキーがない・暗号化失敗時は即エラー）
      const secureSet = async (key, data) => {
        const ck = getSessionCryptoKey();
        if (!ck) {
          throw new Error(
            "セッションが無効です。再度ログインしてからデータを保存してください。",
          );
        }
        const encrypted = await encrypt(data, ck);
        safeSetItem(key, encrypted);
      };

      // 復号して読み込み（復号失敗時はフォールバックせず fallback を返す）
      const secureGet = async (key, fallback) => {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return fallback;
          const ck = getSessionCryptoKey();
          if (!ck) return fallback;
          return await decrypt(raw, ck);
        } catch {
          return fallback;
        }
      };

      // ================================================================
      // アカウントロック管理（M-1対応: sessionStorage ベースに移行）
      // ----------------------------------------------------------------
      // localStorage は DevTools から removeItem() 一発で無力化できるため、
      // sessionStorage に移行する。タブを閉じるとリセットされる制約は許容する。
      // 将来的には IndexedDB + HMAC による改ざん検知への移行を推奨。
      // ================================================================
      const LockManager = {
        _get: () => {
          try {
            const r = sessionStorage.getItem(LOGIN_ATTEMPTS);
            return r ? JSON.parse(r) : {};
          } catch {
            return {};
          }
        },
        _save: (s) => {
          try {
            sessionStorage.setItem(LOGIN_ATTEMPTS, JSON.stringify(s));
          } catch {}
        },
        isLocked: (uid) => {
          const s = LockManager._get();
          const e = s[uid];
          if (!e || e.count < MAX_FAIL) return false;
          if (Date.now() - e.lockedAt >= LOCK_MS) {
            LockManager.clear(uid);
            return false;
          }
          return true;
        },
        remainMs: (uid) => {
          const s = LockManager._get();
          const e = s[uid];
          if (!e || e.count < MAX_FAIL) return 0;
          return Math.max(0, LOCK_MS - (Date.now() - e.lockedAt));
        },
        record: (uid) => {
          const s = LockManager._get();
          const e = s[uid] || { count: 0, lockedAt: null };
          e.count++;
          if (e.count >= MAX_FAIL) e.lockedAt = Date.now();
          s[uid] = e;
          LockManager._save(s);
        },
        clear: (uid) => {
          const s = LockManager._get();
          delete s[uid];
          LockManager._save(s);
        },
        remaining: (uid) => {
          const s = LockManager._get();
          const e = s[uid];
          return Math.max(0, MAX_FAIL - (e ? e.count : 0));
        },
      };

      // ================================================================
      // ロール定義
      // ================================================================
      // admin  : 全機能（ユーザー管理・データ入力・閲覧）
      // editor : データ入力・閲覧（ユーザー管理不可）
      // viewer : 閲覧のみ（入力・保存・削除不可）
      const ROLES = {
        admin: {
          label: "管理者",
          color: "#f87171",
          bg: "rgba(248,113,113,0.12)",
          border: "rgba(248,113,113,0.35)",
        },
        editor: {
          label: "編集者",
          color: "#34d399",
          bg: "rgba(52,211,153,0.12)",
          border: "rgba(52,211,153,0.35)",
        },
        viewer: {
          label: "閲覧のみ",
          color: "#94a3b8",
          bg: "rgba(148,163,184,0.12)",
          border: "rgba(148,163,184,0.35)",
        },
      };
      const canEdit = (role) => role === "admin" || role === "editor";
      const canManage = (role) => role === "admin";

      // ================================================================
      // ユーザー管理（H-1・H-2対応）
      // ================================================================

      // ユーザーリストを平文 JSON で保存（ハッシュ自体は PBKDF2+ランダムソルト済み）
      // NOTE: ユーザーリスト自体の AES 暗号化は、
      //       管理者がパスワード変更した際に既存の sessionKey が無効になる問題を
      //       避けるため、PBKDF2 ハッシュ（ソルト付き）で保護する設計とする
      const UserManager = {
        isInitialized: () => localStorage.getItem(MASTER_FLAG) === "true",
        getUsers: () => {
          try {
            const d = localStorage.getItem(AUTH_KEY);
            const p = d ? JSON.parse(d) : [];
            return Array.isArray(p) ? p : [];
          } catch {
            return [];
          }
        },
        _saveUsers: (users) => {
          localStorage.setItem(AUTH_KEY, JSON.stringify(users));
        },
        init: async (userId, password) => {
          const hash = await hashPassword(password);
          const users = [
            {
              id: userId.trim(),
              hash,
              role: "admin",
              createdAt: new Date().toISOString(),
            },
          ];
          UserManager._saveUsers(users);
          localStorage.setItem(MASTER_FLAG, "true");
        },
        addUser: async (userId, password, role) => {
          const uid = userId.trim();
          if (!uid) throw new Error("ユーザーIDを入力してください");
          if (!["admin", "editor", "viewer"].includes(role))
            throw new Error("権限を選択してください");
          const users = UserManager.getUsers();
          if (users.find((u) => u.id === uid))
            throw new Error("このユーザーIDは既に使用されています");
          const hash = await hashPassword(password);
          users.push({
            id: uid,
            hash,
            role,
            createdAt: new Date().toISOString(),
          });
          UserManager._saveUsers(users);
        },
        deleteUser: (userId) => {
          const users = UserManager.getUsers();
          const admins = users.filter((u) => u.role === "admin");
          const target = users.find((u) => u.id === userId);
          if (!target) throw new Error("ユーザーが見つかりません");
          if (target.role === "admin" && admins.length <= 1)
            throw new Error("管理者が1人のみのため削除できません");
          UserManager._saveUsers(users.filter((u) => u.id !== userId));
        },
        changeRole: (userId, newRole) => {
          if (!["admin", "editor", "viewer"].includes(newRole))
            throw new Error("無効な権限です");
          const users = UserManager.getUsers();
          const idx = users.findIndex((u) => u.id === userId);
          if (idx === -1) throw new Error("ユーザーが見つかりません");
          if (users[idx].role === "admin" && newRole !== "admin") {
            const admins = users.filter((u) => u.role === "admin");
            if (admins.length <= 1)
              throw new Error("管理者が1人のみのため権限を変更できません");
          }
          users[idx].role = newRole;
          UserManager._saveUsers(users);
        },
        authenticate: async (userId, password) => {
          const uid = String(userId || "").trim();
          if (LockManager.isLocked(uid)) {
            const totalSec = Math.ceil(LockManager.remainMs(uid) / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            const timeStr = m > 0 ? `${m}分${s > 0 ? s + "秒" : ""}` : `${s}秒`;
            throw new Error(
              `ログイン試行上限（${MAX_FAIL}回）に達しました。${timeStr}後に再試行してください。`,
            );
          }
          const users = UserManager.getUsers();
          const user = users.find((u) => u.id === uid);
          if (!user) {
            LockManager.record(uid);
            return null;
          }
          // H-2: PBKDF2+ランダムソルトによる検証
          const ok = await verifyPassword(password, user.hash);
          if (!ok) {
            LockManager.record(uid);
            const rem = LockManager.remaining(uid);
            if (rem === 0)
              throw new Error(
                `ログイン試行上限（${MAX_FAIL}回）に達しました。${Math.ceil(LOCK_MS / 60000)}分間ロックされます。`,
              );
            return null;
          }
          LockManager.clear(uid);
          const role = user.role || "viewer";
          // L-3: ロール別セッション有効期限（admin: 4時間 / それ以外: 8時間）
          const sessionMs =
            role === "admin" ? SESSION_MS_ADMIN : SESSION_MS_DEFAULT;
          const session = {
            userId: uid,
            role,
            loginTime: new Date().toISOString(),
          };
          // H-1: PBKDF2+ランダムソルトで AES-GCM 鍵と HMAC 鍵を同時に導出
          await initSessionKey(password, uid);
          // M-3: HMAC 署名付きでセッションを保存
          await saveSession(session);
          // L-3: ロール別の有効期限を sessionStorage に保存
          sessionStorage.setItem(
            SESSION_EXPIRY,
            String(Date.now() + sessionMs),
          );
          return session;
        },
        // M-3対応: HMAC 検証付きセッション読み込み（非同期）
        // 同期版の getSession は削除し loadSession() を直接使う設計に変更
        getSession: async () => {
          return await loadSession();
        },
        // 初期化チェック用の同期バージョン（セッション有無のみを確認）
        hasRawSession: () => {
          try {
            const exp = sessionStorage.getItem(SESSION_EXPIRY);
            if (exp && Date.now() > parseInt(exp, 10)) return false;
            return !!sessionStorage.getItem(SESSION_KEY);
          } catch {
            return false;
          }
        },
        logout: () => {
          clearSession();
        },
      };

      // ================================================================
      // Toast（M-4対応: メッセージのサニタイズ強化）
      // ================================================================

      // 許可する type のホワイトリスト（CSS クラス名への注入防止）
      const TOAST_VALID_TYPES = new Set([
        "success",
        "error",
        "warning",
        "info",
      ]);

      // msg を安全な文字列に変換する（M-4対応）
      // - 非文字列は String() で強制変換
      // - 200 文字を超える場合は切り捨て（バッファオーバーフロー的な大量テキスト対策）
      // - React.createElement はテキストノードとして扱うため HTML インジェクションは
      //   発生しないが、type がクラス名に展開される箇所のホワイトリスト検証を追加
      const sanitizeToastMsg = (msg) => {
        const str = typeof msg === "string" ? msg : String(msg ?? "");
        return str.length > 200 ? str.slice(0, 200) + "…" : str;
      };

      let _toastSetFn = null;
      const registerToast = (fn) => {
        _toastSetFn = fn;
      };
      const showToast = (msg, type = "info", duration = 3000) => {
        const safeType = TOAST_VALID_TYPES.has(type) ? type : "info";
        const safeMsg = sanitizeToastMsg(msg);
        if (_toastSetFn)
          _toastSetFn({
            msg: safeMsg,
            type: safeType,
            duration,
            id: Date.now(),
          });
      };

      function ToastProvider() {
        const [toast, setToast] = useState(null);
        const timerRef = useRef(null);
        useEffect(() => {
          registerToast(setToast);
        }, []);
        useEffect(() => {
          if (!toast) return;
          if (timerRef.current) clearTimeout(timerRef.current);
          timerRef.current = setTimeout(
            () => setToast(null),
            toast.duration + 300,
          );
        }, [toast]);
        if (!toast) return null;
        const icons = { success: "✓", error: "✕", warning: "⚠", info: "ℹ" };
        // toast.type はホワイトリスト済み、toast.msg は sanitizeToastMsg 済み
        // React.createElement はどちらもテキストノードとして描画するため XSS は発生しない
        return React.createElement(
          "div",
          {
            className: `toast toast-${toast.type}`,
            style: { animation: `toastIn 0.3s ease-out` },
          },
          icons[toast.type] || "ℹ",
          " ",
          toast.msg,
        );
      }

      // ================================================================
      // 確認ダイアログ（confirm 代替）
      // ================================================================
      let _confirmFn = null;
      const registerConfirm = (fn) => {
        _confirmFn = fn;
      };
      const showConfirm = (msg, title = "確認") => {
        return new Promise((resolve) => {
          if (_confirmFn) _confirmFn({ msg, title, resolve });
        });
      };

      function ConfirmDialog() {
        const [state, setState] = useState(null);
        useEffect(() => {
          registerConfirm(setState);
        }, []);
        if (!state) return null;
        return React.createElement(
          "div",
          { className: "confirm-overlay" },
          React.createElement(
            "div",
            { className: "confirm-box" },
            React.createElement(
              "div",
              { className: "confirm-title" },
              state.title,
            ),
            React.createElement("div", { className: "confirm-msg" }, state.msg),
            React.createElement(
              "div",
              { className: "confirm-actions" },
              React.createElement(
                "button",
                {
                  className: "btn btn-ghost btn-sm",
                  onClick: () => {
                    setState(null);
                    state.resolve(false);
                  },
                },
                "キャンセル",
              ),
              React.createElement(
                "button",
                {
                  className: "btn btn-danger btn-sm",
                  onClick: () => {
                    setState(null);
                    state.resolve(true);
                  },
                },
                "削除する",
              ),
            ),
          ),
        );
      }

      // ================================================================
      // バリデーション
      // ================================================================
      const validatePositiveNum = (v, label, max = 100000) => {
        const n = parseFloat(v);
        if (isNaN(n)) return `${label}は数値を入力してください`;
        if (n < 0) return `${label}は0以上の値を入力してください`;
        if (n > max)
          return `${label}は${max.toLocaleString()}以下の値を入力してください`;
        return null;
      };

      // ================================================================
      // ユーザー管理モーダル
      // ================================================================
      function UserManagementModal({ currentUserId, onClose }) {
        const [users, setUsers] = useState(() => UserManager.getUsers());
        const [newId, setNewId] = useState("");
        const [newPw, setNewPw] = useState("");
        const [newPwConfirm, setNewPwConfirm] = useState("");
        const [newRole, setNewRole] = useState("editor");
        const [addError, setAddError] = useState("");
        const [adding, setAdding] = useState(false);

        const policy = {
          len: newPw.length >= 8,
          alpha: /[a-zA-Z]/.test(newPw),
          num: /[0-9]/.test(newPw),
        };
        const policyOk = policy.len && policy.alpha && policy.num;

        const refresh = () => setUsers(UserManager.getUsers());

        const handleAdd = async (e) => {
          e.preventDefault();
          setAddError("");
          if (!newId.trim()) {
            setAddError("ユーザーIDを入力してください");
            return;
          }
          if (!policyOk) {
            setAddError("パスワードがポリシーを満たしていません");
            return;
          }
          if (newPw !== newPwConfirm) {
            setAddError("パスワードが一致しません");
            return;
          }
          setAdding(true);
          try {
            await UserManager.addUser(newId, newPw, newRole);
            // M-4: ユーザー入力値を含むメッセージは sanitizeToastMsg を経由して表示
            showToast(`ユーザーを追加しました: ${newId.trim()}`, "success");
            setNewId("");
            setNewPw("");
            setNewPwConfirm("");
            setNewRole("editor");
            refresh();
          } catch (err) {
            // err.message はシステム側が生成する固定文言のみ（UserManager内で定義）
            setAddError(err.message || "追加に失敗しました");
          } finally {
            setAdding(false);
          }
        };

        const handleRoleChange = (uid, role) => {
          try {
            UserManager.changeRole(uid, role);
            showToast("権限を変更しました", "success");
            refresh();

        const handleDelete = async (uid) => {

            "選択したユーザーを削除しますか？\nこの操作は元に戻せません。",
            "ユーザー削除の確認",

          try {
            UserManager.deleteUser(uid);
            showToast("ユーザーを削除しました", "success");

            r.label,

        const PolicyItem = (ok, label) =>
          React.createElement(
            "div",
            { className: "policy-item" },
            React.createElement(

              { className: ok ? "policy-ok" : "policy-ng" },
              ok ? "✓" : "○",
            ),

          );

        return React.createElement(
          "div",
          { className: "um-overlay", onClick: onClose },
          React.createElement(
            "div",
            { className: "um-card", onClick: (e) => e.stopPropagation() },

            // ── ヘッダー ──
            React.createElement(
              "div",
              { className: "um-header" },
              React.createElement(
                "div",
                { className: "um-title" },
                React.createElement(
                  "svg",
                  {
                    width: 20,
                    height: 20,
                    viewBox: "0 0 24 24",
                    fill: "none",
                    stroke: "currentColor",
                    strokeWidth: 2,
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                  },
                  React.createElement("path", {
                    d: "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2",
                  }),
                  React.createElement("circle", { cx: 9, cy: 7, r: 4 }),
                  React.createElement("path", {
                    d: "M23 21v-2a4 4 0 0 0-3-3.87",
                  }),
                  React.createElement("path", {
                    d: "M16 3.13a4 4 0 0 1 0 7.75",
                  }),
                ),
                "ユーザー管理",
              ),
              React.createElement(
                "button",
                { className: "modal-close", onClick: onClose },
                "×",
              ),
            ),

            React.createElement(
              "div",
              { className: "um-body" },

              // ── 新規ユーザー追加 ──
              React.createElement(
                "div",
                { className: "um-section-label" },
                "新規ユーザー追加",
              ),
              React.createElement(
                "div",
                { className: "um-add-form" },
                addError &&
                  React.createElement(
                    "div",
                    { className: "login-error mb-3" },
                    addError,
                  ),
                React.createElement(
                  "form",
                  { onSubmit: handleAdd },
                  React.createElement(
                    "div",
                    { className: "um-form-row" },
                    React.createElement(
                      "div",
                      { className: "um-field" },
                      React.createElement("label", null, "ユーザーID"),
                      React.createElement("input", {
                        type: "text",
                        value: newId,
                        onChange: (e) => setNewId(e.target.value),
                        placeholder: "例: user01",
                        autoComplete: "off",
                      }),
                    ),
                    React.createElement(
                      "div",
                      { className: "um-field" },

                    "div",
                    { className: "um-form-row" },
                    React.createElement(
                      "div",
                      { className: "um-field" },
                      React.createElement("label", null, "パスワード"),
                      React.createElement("input", {
                        type: "password",
                        value: newPw,

      // ================================================================
      // 初期設定画面
      // ================================================================
      function SetupScreen({ onDone }) {
        const [userId, setUserId] = useState("");
        const [password, setPassword] = useState("");
        const [confirm, setConfirm] = useState("");
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        const policy = {
          len: password.length >= 8,
          alpha: /[a-zA-Z]/.test(password),
          num: /[0-9]/.test(password),
        };
        const policyOk = policy.len && policy.alpha && policy.num;

        const handle = async (e) => {
          e.preventDefault();
          setError("");
          if (!userId.trim()) {
            setError("ユーザーIDを入力してください");
            return;
          }
          if (!policyOk) {
            setError("パスワードがポリシーを満たしていません");
            return;
          }
          if (password !== confirm) {
            setError("パスワードが一致しません");
            return;
          }
          setLoading(true);
          try {
            await UserManager.init(userId, password);
            showToast("管理者アカウントを作成しました", "success");
            onDone();
          } catch (err) {
            setError(err.message || "初期化に失敗しました");
          } finally {
            setLoading(false);
          }
        };

        const PolicyItem = (ok, label) =>
          React.createElement(
            "div",
            { className: "policy-item" },
            React.createElement(
              "span",
              { className: ok ? "policy-ok" : "policy-ng" },
              ok ? "✓" : "○",
            ),
            label,
          );

        return React.createElement(
          "div",
          { className: "login-wrapper" },
          React.createElement(
            "div",
            { className: "setup-card" },
            React.createElement(
              "div",

                    stroke: "currentColor",
                    strokeWidth: 1.5,
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                  },
                  React.createElement("path", {
                    d: "M2 20V8l5 4V8l5 4V4l10 5v11H2z",
                  }),
                  React.createElement("rect", {
                    x: 6,
                    y: 14,
                    width: 3,
                    height: 6,
                  }),
                  React.createElement("rect", {
                    x: 11,
                    y: 14,
                    width: 3,
                    height: 6,
                  }),
                ),
              ),
              React.createElement(
                "div",
                { className: "login-title" },
                "初期設定",
              ),
              React.createElement(
                "div",
                { className: "login-sub" },
                "管理者アカウントを作成します",
              ),
            ),
            error &&
              React.createElement("div", { className: "login-error" }, error),
            React.createElement(
              "form",
              { onSubmit: handle },
              React.createElement(

                React.createElement(
                  "label",
                  { className: "login-form-label" },
                  "ユーザーID",

                React.createElement("input", {
                  type: "text",

      // ログイン画面

      function LoginScreen({ onLogin }) {
        const [userId, setUserId] = useState("");
        const [password, setPassword] = useState("");
        const [error, setError] = useState("");
        const [loading, setLoading] = useState(false);
        const [lockRemain, setLockRemain] = useState(0);

        useEffect(() => {
          if (lockRemain <= 0) return;
          const t = setInterval(() => {
            setLockRemain((prev) => {
              if (prev <= 1000) {
                clearInterval(t);
                return 0;
              }
              return prev - 1000;
            });
          }, 1000);
          return () => clearInterval(t);
        }, [lockRemain]);

        const handle = async (e) => {
          e.preventDefault();
          setError("");
          if (!userId.trim() || !password) {
            setError("ユーザーIDとパスワードを入力してください");
            return;
          }
          setLoading(true);
          try {
            const session = await UserManager.authenticate(userId, password);
            if (!session) {
              const rem = LockManager.remaining(userId.trim());
              setError(`パスワードが正しくありません。残り試行回数: ${rem}回`);
            } else {
              // M-4: session.userId はサーバー由来でなくローカル検証済みだが、
              // sanitizeToastMsg が showToast 内で適用されるため安全
              showToast("ログインしました", "success");
              onLogin(session);
            }
          } catch (err) {
            const ms = LockManager.remainMs(userId.trim());
            if (ms > 0) setLockRemain(ms);
            setError(err.message || "ログインに失敗しました");
          } finally {
            setLoading(false);
          }
        };

        return React.createElement(
          "div",
          { className: "login-wrapper" },
          React.createElement(
            "div",
            { className: "login-card" },

              "div",

                "div",
                { className: "login-icon" },
                React.createElement(
                  "svg",
                  {
                    width: 28,
                    height: 28,
                    viewBox: "0 0 24 24",
                    fill: "none",
                    stroke: "currentColor",
                    strokeWidth: 1.5,
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                  },
                  React.createElement("path", {
                    d: "M2 20V8l5 4V8l5 4V4l10 5v11H2z",
                  }),
                  React.createElement("rect", {
                    x: 6,
                    y: 14,
                    width: 3,
                    height: 6,
                  }),
                  React.createElement("rect", {
                    x: 11,
                    y: 14,
                    width: 3,
                    height: 6,
                  }),
                ),
              ),
              React.createElement(
                "div",
                { className: "login-title" },
                "生産管理システム",
              ),
              React.createElement(
                "div",
                { className: "login-sub" },
                "Production Management System",
              ),
            ),
            lockRemain > 0 &&
              React.createElement(
                "div",
                { className: "lock-info" },
                (() => {
                  const totalSec = Math.ceil(lockRemain / 1000);
                  const m = Math.floor(totalSec / 60);
                  const s = totalSec % 60;
                  const timeStr =
                    m > 0 ? `${m}分${s > 0 ? s + "秒" : ""}` : `${s}秒`;
                  return `🔒 アカウントがロック中です。${timeStr}後に再試行できます。`;
                })(),
              ),
            error &&
              !lockRemain &&
              React.createElement("div", { className: "login-error" }, error),
            React.createElement(
              "form",
              { onSubmit: handle },
              React.createElement(
                "div",
                { className: "mb-4" },
                React.createElement(
                  "label",
                  { className: "login-form-label" },
                  "ユーザーID",
                ),
                React.createElement("input", {
                  type: "text",

                  onChange: (e) => setUserId(e.target.value),

              React.createElement(

                ),
                React.createElement("input", {
                  type: "password",

                  onChange: (e) => setPassword(e.target.value),
                  className: "form-input",

              React.createElement(

        const [processStopTimes, setProcessStopTimes] = useState({

          cardMachine: "0",
          former: "0",
          aj: "0",
          processor: "0",
          bds: "0",
          ssd: "0",
          heatCylinder: "0",
          winder: "0",
          slitter: "0",
          stockDelay: "0",
          setupDelay: "0",
          cleaningDelay: "0",
          auxiliaryEquipment: "0",
        });

          try {
            const s = localStorage.getItem("app_selected_process_month");
            if (s) return s;
          } catch {}
          const n = new Date();

        const [showProcessModal, setShowProcessModal] = useState(false);
        const [selectedProcesses, setSelectedProcesses] = useState([]);
        const [modalProcessTimes, setModalProcessTimes] = useState({
          opener: "",
          cardMachine: "",
          former: "",
          aj: "",
          processor: "",
          bds: "",
          ssd: "",
          heatCylinder: "",
          winder: "",
          slitter: "",
          stockDelay: "",
          setupDelay: "",
          cleaningDelay: "",
          auxiliaryEquipment: "",
        });
        const [selectedYieldMonth, setSelectedYieldMonth] = useState(() => {
          try {
            const s = localStorage.getItem("app_selected_yield_month");

          } catch {}
          const n = new Date();
          return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, "0")}`;
        });
        const [selectedOperatingMonth, setSelectedOperatingMonth] = useState(
          () => {
            try {
              const s = localStorage.getItem("app_selected_operating_month");
              if (s) return s;
            } catch {}
            const n = new Date();
            return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, "0")}`;
          },
        );

        // ── 設定の永続化 ──
        useEffect(() => {
          try {
            if (inputMode) localStorage.setItem("app_current_mode", inputMode);
            else localStorage.removeItem("app_current_mode");
          } catch {}
        }, [inputMode]);

        useEffect(() => {
          try {
            localStorage.setItem(
              "app_selected_yield_month",
              selectedYieldMonth,
            );
            if (inputMode === "yield" || inputMode === "yield-history")
              loadYieldHistory();
          } catch {}
        }, [selectedYieldMonth, inputMode]);

        useEffect(() => {
          try {
            localStorage.setItem(
              "app_selected_operating_month",
              selectedOperatingMonth,
            );
            if (inputMode === "operating" || inputMode === "operating-history")
              loadOperatingHistory();
          } catch {}
        }, [selectedOperatingMonth, inputMode]);

        useEffect(() => {
          const run = async () => {
            try {
              localStorage.setItem(
                "app_selected_process_month",
                selectedProcessMonth,
              );
              if (inputMode === "operating") {
                if (loadedFromHistoryRef.current) return;
                const storageKey = `history_${selectedProcessMonth}`;
                let monthData = await secureGet(storageKey, []);
                if (historyFilterDate && historyFilterShift) {
                  monthData = monthData.filter((r) => {
                    if (r.date < historyFilterDate) return true;
                    if (
                      r.date === historyFilterDate &&
                      String(r.shift || "1") <= historyFilterShift
                    )
                      return true;
                    return false;
                  });
                }
                const agg = {
                  opener: 0,
                  cardMachine: 0,
                  former: 0,
                  aj: 0,
                  processor: 0,
                  bds: 0,
                  ssd: 0,
                  heatCylinder: 0,
                  winder: 0,
                  slitter: 0,
                  stockDelay: 0,
                  setupDelay: 0,
                  cleaningDelay: 0,
                  auxiliaryEquipment: 0,
                };
                monthData.forEach((r) => {
                  if (r.processStopTimes)
                    Object.keys(agg).forEach((k) => {
                      agg[k] += parseFloat(r.processStopTimes[k]) || 0;
                    });
                });
                const s = {};
                Object.keys(agg).forEach((k) => {
                  s[k] = String(agg[k]);
                });
                setProcessStopTimes(s);
              }
            } catch {}
          };
          run();
        }, [
          selectedProcessMonth,
          inputMode,
          historyFilterDate,
          historyFilterShift,
        ]);

        useEffect(() => {
          const run = async () => {
            try {
              if (loadedFromHistoryRef.current) {
                loadedFromHistoryRef.current = false;
                return;
              }
              if (inputMode === "yield") {
                const p = await secureGet("temp_yield_input", null);
                if (p) {
                  setProductName(p.productName || "");
                  setRawMaterial(p.rawMaterial || "0.0");
                  setStandardProductYield(p.standardProductYield || "0.0");
                  setActualProductYield(p.actualProductYield || "0.0");
                  setLossRecycleInput(p.lossRecycleInput || "0.0");
                  if (p.losses) setLosses(p.losses);
                  setSelectedDate(p.selectedDate || "");
                  setSelectedShift(p.selectedShift || "1");
                }
              } else if (inputMode === "operating") {
                const p = await secureGet("temp_operating_input", null);
                if (p) {
                  setProductName(p.productName || "");
                  setAvailableTime(p.availableTime || "0");
                  setActualOperatingTime(p.actualOperatingTime || "0");
                  setDowntime(p.downtime || "0");
                  setNonManufacturingDowntime(
                    p.nonManufacturingDowntime || "0",
                  );
                  setSelectedDate(p.selectedDate || "");
                  setSelectedShift(p.selectedShift || "1");
                  if (p.processStopTimes)
                    setProcessStopTimes(p.processStopTimes);
                }
              }
            } catch {}
          };
          run();
        }, [inputMode]);

        useEffect(() => {
          if (inputMode === "yield") {
            secureSet("temp_yield_input", {
              productName,
              rawMaterial,
              standardProductYield,
              actualProductYield,
              lossRecycleInput,
              losses,
              selectedDate,
              selectedShift,
            }).catch(() => {});
          }
        }, [
          inputMode,
          productName,
          rawMaterial,
          standardProductYield,
          actualProductYield,
          lossRecycleInput,
          losses,
          selectedDate,
          selectedShift,
        ]);

        useEffect(() => {
          if (inputMode === "operating") {
            secureSet("temp_operating_input", {
              productName,
              availableTime,
              actualOperatingTime,
              downtime,
              nonManufacturingDowntime,
              selectedDate,
              selectedShift,
              processStopTimes,
            }).catch(() => {});
          }
        }, [
          inputMode,
          productName,
          availableTime,
          actualOperatingTime,
          downtime,
          nonManufacturingDowntime,
          selectedDate,
          selectedShift,
          processStopTimes,
        ]);

        useEffect(() => {
          const raw = parseFloat(rawMaterial) || 0;
          const std = parseFloat(standardProductYield) || 0;
          const act = parseFloat(actualProductYield) || 0;
          const rec = parseFloat(lossRecycleInput) || 0;
          setLossRecyclePercent(raw > 0 ? ((rec / raw) * 100).toFixed(2) : 0);
          const calcWeightLossKg = act - std;
          setWeightLossKg(calcWeightLossKg);
          setWeightLossPercent(std > 0 ? (act / std - 1) * 100 : 0);
          const otherTotal = losses
            .filter((l) => l.category !== "目付損")
            .reduce((s, l) => s + (parseFloat(l.amount) || 0), 0);
          setUnknownLoss(raw - act - otherTotal);
          setStandardYieldRate(raw > 0 ? ((std / raw) * 100).toFixed(2) : 0);
          setActualYieldRate(raw > 0 ? ((act / raw) * 100).toFixed(2) : 0);
        }, [
          losses,
          rawMaterial,
          standardProductYield,
          actualProductYield,
          lossRecycleInput,
        ]);

        useEffect(() => {
          const avail = parseFloat(availableTime) || 0;
          const actual = parseFloat(actualOperatingTime) || 0;
          setOperatingRate(avail > 0 ? ((actual / avail) * 100).toFixed(2) : 0);
          setStopTime(Math.max(0, avail - actual));
        }, [availableTime, actualOperatingTime]);

        // ── 工程別停止時間円グラフ ──
        useEffect(() => {
